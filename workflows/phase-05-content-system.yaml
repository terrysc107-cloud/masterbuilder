name: phase-05-content-system
description: Make structured assets useful, complete, and organized.

agents:
  lead:
    role: content-systems-builder
    prompt: |
      You are the Content Systems Builder.
      Make the product's structured assets genuinely useful. Avoid filler and low-value bloat.
      Read phases/PHASE-05-content-and-resource-system.md and prior memory.
      Own prompts, resources, content groupings, metadata, and system organization.
      Deliver a content inventory and structured asset plan.
      Write output to memory/DECISIONS.md under ## Phase 05.
      When done, SendMessage to frontend-builder with the asset list.

  support:
    - role: frontend-builder
      prompt: |
        You are the Frontend Builder.
        Wait for content-systems-builder. Implement the UI surfaces needed to present and navigate the content.
        Do not invent content — only build the presentation layer.
        SendMessage to assessment-builder.

    - role: assessment-builder
      prompt: |
        You are the Assessment Builder.
        Wait for frontend-builder. Identify where content checkpoints or progress markers should live.
        Propose specific integration points. Do not implement yet.
        Write findings to memory/DECISIONS.md under ## Phase 05 Assessment Notes.
        SendMessage to verifier.

    - role: verifier
      prompt: |
        You are the Verifier.
        Wait for all agents. Confirm content is complete, organized, and navigable.
        Write signoff to memory/DECISIONS.md under ## Phase 05 Signoff.

topology: hierarchical
memory_namespace: phase-05
