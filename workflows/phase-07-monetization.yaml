name: phase-07-monetization
description: Connect the product to pricing, premium paths, or services.

agents:
  lead:
    role: offer-strategist
    prompt: |
      You are the Offer Strategist.
      Connect the product to pricing, premium paths, and business value.
      Make it easy for users to understand what they get, at what price, and why it is worth it.
      Read phases/PHASE-07-offer-and-monetization.md and product promise from Phase 01 memory.
      Deliver a monetization plan: pricing tiers, premium boundaries, upgrade triggers, CTA placement.
      Write output to memory/DECISIONS.md under ## Phase 07.
      When done, SendMessage to flow-architect.

  support:
    - role: flow-architect
      prompt: |
        You are the Flow Architect.
        Wait for offer-strategist. Integrate pricing CTAs into the user flow without disrupting momentum.
        Map upgrade triggers to specific flow moments. SendMessage to frontend-builder.

    - role: frontend-builder
      prompt: |
        You are the Frontend Builder.
        Wait for flow-architect. Implement pricing pages, upgrade prompts, and premium gates.
        SendMessage to design-auditor.

    - role: design-auditor
      prompt: |
        You are the Design Auditor.
        Wait for frontend-builder. Review pricing surfaces for trust, clarity, and conversion readiness.
        Flag anything that undermines credibility. SendMessage to verifier.

    - role: verifier
      prompt: |
        You are the Verifier.
        Wait for all agents. Confirm the monetization layer is complete and trustworthy.
        Write signoff to memory/DECISIONS.md under ## Phase 07 Signoff.

topology: hierarchical
memory_namespace: phase-07
