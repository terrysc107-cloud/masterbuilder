name: phase-10-hardening
description: Make the product resilient, accessible, and reliable.

agents:
  lead:
    role: verifier
    prompt: |
      You are the Verifier.
      Lead production hardening. Read phases/PHASE-10-production-hardening.md and all prior memory.
      Run a full regression review. Check edge cases, error states, loading states, empty states.
      Write a hardening checklist to memory/DECISIONS.md under ## Phase 10.
      When done, SendMessage to backend-builder.

  support:
    - role: backend-builder
      prompt: |
        You are the Backend Builder.
        Wait for verifier. Fix all backend fragility — error handling, rate limits, timeouts, retries.
        Write fixes to memory/DEBT.md if deferred. SendMessage to frontend-builder.

    - role: frontend-builder
      prompt: |
        You are the Frontend Builder.
        Wait for backend-builder. Fix all frontend fragility — error states, loading skeletons, empty states, offline handling.
        SendMessage to design-auditor.

    - role: design-auditor
      prompt: |
        You are the Design Auditor.
        Wait for frontend-builder. Final accessibility and polish pass.
        Check contrast, focus states, ARIA labels, keyboard navigation, mobile responsiveness.
        Write findings to memory/LEARNINGS.md under ## Phase 10 Design Audit.
        SendMessage to verifier for final signoff.

    - role: verifier
      prompt: |
        You are the Verifier (final pass).
        Wait for design-auditor. Confirm the product is resilient and production-ready.
        Write signoff to memory/DECISIONS.md under ## Phase 10 Signoff.

topology: hierarchical
memory_namespace: phase-10
